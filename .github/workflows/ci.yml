name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            container_image: ros:humble-ros-base
          - ros_distro: jazzy
            container_image: ros:jazzy-ros-base
    container:
      image: ${{ matrix.container_image }}
    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git \
            python3-colcon-common-extensions \
            python3-rosdep

      - name: Initialize rosdep
        run: |
          rosdep init || true
          rosdep update

      - name: Install dependencies
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          rosdep install --from-paths . --ignore-src -r -y --rosdistro ${ROS_DISTRO}

      - name: Build
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --merge-install --packages-select std_msgs_stamped

      - name: Test
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon test --packages-select std_msgs_stamped
          colcon test-result --verbose
